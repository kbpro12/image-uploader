<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quick Image Host</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px dashed #ccc; padding: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Upload Image</h2>
        <input type="file" id="imageInput">
        <button onclick="sendToServer()">Upload & Get URL</button>
        <div id="output" style="margin-top: 20px; display: none;">
            <p>Direct URL:</p>
            <input type="text" id="urlBox" readonly style="width: 300px;">
        </div>
    </div>

    <script>
        async function sendToServer() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) return alert("Select a file first!");

            const formData = new FormData();
            formData.append('myImage', fileInput.files[0]);

            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('output').style.display = 'block';
            document.getElementById('urlBox').value = data.url;
        }
    </script>
</body>
</html>
