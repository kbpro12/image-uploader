<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Image Loader | Fast & Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #312e81, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h1 { font-size: 1.8rem; margin: 0; color: #fff; }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
            display: block;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        #previewImg {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        .result-box {
            margin-top: 2rem;
            display: none;
            text-align: left;
        }

        .url-wrapper {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.8rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            margin-top: 0.5rem;
        }

        #urlDisplay {
            background: transparent;
            border: none;
            color: #38bdf8;
            flex-grow: 1;
            font-family: monospace;
            outline: none;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-icon">☁️</div>
    <h1>EA Image Loader</h1>
    <p>Upload your image and get a global link.</p>

    <label for="imageInput" class="upload-area">
        <img id="previewImg" src="#" alt="Preview">
        <div id="statusText">Click to select image</div>
        <input type="file" id="imageInput" accept="image/*">
    </label>

    <button class="btn" onclick="handleUpload()">Upload to EA</button>

    <div class="result-box" id="resultBox">
        <span style="font-size: 0.7rem; color: #94a3b8; font-weight: bold;">DIRECT URL</span>
        <div class="url-wrapper">
            <input type="text" id="urlDisplay" readonly>
            <button onclick="copyLink()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">📋</button>
        </div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');
    const statusText = document.getElementById('statusText');

    imageInput.addEventListener('change', () => {
        const file = imageInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                statusText.innerText = file.name;
            }
            reader.readAsDataURL(file);
        }
    });

    async function handleUpload() {
        if (!imageInput.files[0]) return alert("Select a file!");
        const formData = new FormData();
        formData.append('myImage', imageInput.files[0]);
        statusText.innerText = "Processing...";

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('urlDisplay').value = data.url;
            statusText.innerText = "Upload Finished!";
        } catch (err) {
            alert("Upload failed.");
        }
    }

    function copyLink() {
        const urlBox = document.getElementById("urlDisplay");
        urlBox.select();
        navigator.clipboard.writeText(urlBox.value);
        alert("Link copied!");
    }
</script>
</body>
</html>
